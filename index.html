<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>A.M Tools Hub</title>
  <meta name="description" content="A small hub for self-built web tools." />

  <style>
    :root {
      --bg: #f6f4ef;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.12), transparent 32rem),
        var(--bg);
      color: var(--text);
    }

    main {
      width: min(960px, calc(100% - 32px));
      margin: 0 auto;
      padding: 64px 0;
    }

    .hero {
      margin-bottom: 32px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    h1 {
      margin: 20px 0 12px;
      font-size: clamp(36px, 7vw, 64px);
      line-height: 1.02;
      letter-spacing: -0.05em;
    }

    .subtitle {
      max-width: 680px;
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
      margin-top: 36px;
    }

    .card {
      display: flex;
      flex-direction: column;
      min-height: 240px;
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow);
      text-decoration: none;
      color: inherit;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(37, 99, 235, 0.35);
      box-shadow: 0 22px 56px rgba(15, 23, 42, 0.12);
    }

    .icon {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: var(--accent-soft);
      font-size: 28px;
      margin-bottom: 22px;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 26px;
      letter-spacing: -0.03em;
    }

    .card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .open {
      margin-top: auto;
      padding-top: 28px;
      color: var(--accent);
      font-weight: 800;
    }

    footer {
      margin-top: 42px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 720px) {
      main {
        padding: 40px 0;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .card {
        min-height: 220px;
      }
    }
  </style>
</head>

<body>
  <main>
    <section class="hero">
      <div class="eyebrow">Wingsocool · Tools Hub</div>
      <h1>A.M Tools</h1>
      <p class="subtitle">
        一个轻量工具入口页。这里集中放置自己做的小网页应用，方便从同一个域名快速进入。
      </p>
    </section>

    <section class="grid" aria-label="工具列表">
      <a class="card" href="/vocab-trainer/">
        <div class="icon">📚</div>
        <h2>COCA 5000 高频词学习器</h2>
        <p>
          高频词测试、背词池、今日复习和遗忘曲线进度管理。适合每天筛词和复习。
        </p>
        <div class="open">打开工具 →</div>
      </a>

      <a class="card" href="/postcard-maker/">
        <div class="icon">✉️</div>
        <h2>旅行明信片工坊</h2>
        <p>
          明信片制作工具。用于快速生成、编辑或排版个人化卡片内容。
        </p>
        <div class="open">打开工具 →</div>
      </a>
    </section>

    <footer>
      <p>© Wingsocool · Personal web tools by Wingsocool</p>
    </footer>
  </main>
</body>
</html>
